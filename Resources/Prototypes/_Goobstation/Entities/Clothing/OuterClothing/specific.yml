- type: entity
  parent: ClothingOuterHardsuitBase
  id: ClothingOuterSuitHEV
  name: костюм H.E.V.
  description: Полноценный защитный костюм, предназначенный для защиты носителя от радиации, электрических разрядов и тупых травм при работе с опасными материалами.
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/OuterClothing/Suits/hev.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/OuterClothing/Suits/hev.rsi
  - type: ExplosionResistance
    damageCoefficient: 0.7
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.7
        Shock: 0.7
        Radiation: 0.01
        Caustic: 0.5
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: HeldSpeedModifier
  - type: ToggleableClothing # Goobstation - Modsuits change
    clothingPrototypes:
      head: ClothingHeadHelmetHEV
  - type: ClothingGrantComponent
    component: # same as CE suit
      - type: SupermatterImmune
      - type: EventHorizonIgnore
        horizonWhitelist:
          tags:
          - Tesla
      - type: ContainmentFieldIgnore
  - type: Tag
    tags:
      - HEVSuit

- type: entity
  parent: ClothingOuterBase
  id: SurveillanceWirelessCameraBodyEntertainment
  name: камера NoPro
  description: Нательная камера. Она наблюдает за тобой.
  components:
    - type: DeviceNetwork
      deviceNetId: Wireless
      receiveFrequencyId: SurveillanceCameraEntertainment
      transmitFrequencyId: SurveillanceCamera
    - type: SurveillanceCamera
      networkSet: true
      nameSet: True
      mobile: True  # Goobstation - mobile cameras fix
      id: Камера NoPro
    - type: Eye
    - type: WirelessNetworkConnection
      range: 200
    - type: SurveillanceCameraMicrophone
      blacklist:
        components:
          - SurveillanceCamera
          - SurveillanceCameraMonitor
          - RadioSpeaker
    - type: ActiveListener
      range: 10
    - type: ClothingGrantComponent
      component:
      - type: StationAiVision
        range: 4
    - type: Sprite
      sprite: _Goobstation/Clothing/OuterClothing/Misc/nopro.rsi
    - type: Clothing
      sprite: _Goobstation/Clothing/OuterClothing/Misc/nopro.rsi
      quickEquip: true

