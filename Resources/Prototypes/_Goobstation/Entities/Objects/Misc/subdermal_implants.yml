- type: entity
  parent: BaseSubdermalImplant
  id: BluespaceLifelineImplant
  name: блюспейс-имплант спасательного троса
  description: Телепортирует тело носителя в Центральное Командование при активации. Возврат невозможен.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    permanent: true
    implantAction: ActionActivateBluespaceLifeline
  - type: MansusGraspBlockTrigger
  - type: TriggerOnMobstateChange
    mobState:
    - Dead
  - type: TriggerOnActivateImplant
  - type: DeleteParentOnTrigger
  - type: SpawnOnTrigger
    proto: BluespaceLifelineSpawnCore
  - type: Tag
    tags:
    - SubdermalImplant
    - HideContextMenu

- type: entity
  parent: BaseSubdermalImplant
  id: CommandTrackingImplant
  name: имплант отслеживания командования
  description: Этот имплант, предназначенный для командования, оснащён отслеживающим устройством, подключённым к частной сети датчиков костюмов, а также монитором состояния для радиоканала Командования.
  categories: [ HideSpawnMenu ]
  components:
    - type: SubdermalImplant
      whitelist:
        components:
        - MobState
    - type: SuitSensor
      randomMode: false
      controlsLocked: true
      commandTracker: true
      mode: SensorCords
      activationContainer: "implant"
    - type: DeviceNetwork
      deviceNetId: Wireless
      transmitFrequencyId: SuitSensor
    - type: StationLimitedNetwork
    - type: WirelessNetworkConnection
      range: 500

- type: entity
  parent: BaseSubdermalImplant
  id: PacifismImplant
  name: имплант пацифизма
  description: Имплант пацифизма, выдаваемый пожизненно осуждённым или тому подобным лицам, чтобы предотвратить совершение насилия.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    whitelist:
      components:
      - MobState
  - type: Pacified

- type: entity
  parent: BaseSubdermalImplant
  id: SmokeImplant
  name: дымовой имплант
  description: Этот имплант при активации выпускает облако дыма.
  categories: [ HideSpawnMenu ]
  components:
    - type: SubdermalImplant
      implantAction: ActivateSmokeImplant
    - type: TriggerOnActivateImplant
    - type: SmokeOnTrigger
      spreadAmount: 25
      duration: 10
    - type: EmitSoundOnTrigger
      sound: /Audio/Effects/smoke.ogg

- type: entity
  parent: BaseSubdermalImplant
  id: KravMagaImplant
  name: имплант крав-мага
  description: Этот имплант позволяет пользователю выполнять различные приёмы Крав-Мага.
  categories: [ HideSpawnMenu ]
  components:
  - type: ComponentsImplant
    added:
    - type: KravMaga

- type: entity
  parent: BaseSubdermalImplant
  id: AutoinjectorImplant
  name: имплант-автоинъектор
  description: Этот имплант позволяет пользователю вводить себе химическое вещество при использовании. По умолчанию — эфедрин.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    implantAction: ActionActivateAutoinjector
  - type: Tag
    tags:
    - SubdermalImplant
    - HideContextMenu

- type: entity
  parent: BaseSubdermalImplant
  id: NutrimentPumpImplant
  name: имплант питательной помпы
  description: Этот имплант не даёт пользователю проголодаться или захотеть пить.
  categories: [ HideSpawnMenu ]
  components:
  - type: NutrimentPumpImplant

- type: entity
  parent: BaseSubdermalImplant
  id: SpaceProofImplant
  name: имплант защиты от космоса
  description: Этот имплант позволяет пользователю выживать в космосе и без воздуха.
  categories: [ HideSpawnMenu ]
  components:
  - type: ComponentsImplant
    added:
    - type: BreathingImmunity
    - type: PressureImmunity
    - type: SpecialLowTempImmunity

- type: entity
  parent: BaseSubdermalImplant
  id: StypticStimulatorImplant
  name: имплант стимуляции заживления
  description: Этот имплант запускает регенерацию пользователя на полную мощность.
  categories: [ HideSpawnMenu ]
  components:
  - type: StypticStimulatorImplant

- type: entity
  parent: BaseSubdermalImplant
  id: BinaryImplant
  name: имплант бинарного декодера
  description: Этот имплант позволяет пользователю получить доступ к Бинарному каналу и общаться с силиконами (используйте +b).
  categories: [ HideSpawnMenu ]
  components:
  - type: ImplantGrantCollectiveMind
    collectiveMind: Binary

- type: entity
  parent: BaseSubdermalImplant
  id: ClumsyImplant
  name: имплант неуклюжести
  description: Этот имплант делает пользователя неуклюжим, позволяя управлять определённым транспортным средством.
  categories: [ HideSpawnMenu ]
  components:
  - type: ComponentsImplant
    added:
    - type: Clumsy

- type: entity
  parent: BaseSubdermalImplant
  id: ShadowmindImplant
  name: имплант теневого разума
  description: Этот имплант позволяет пользователю получить доступ к каналу Теневого Разума (используйте +q).
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    permanent: true
  - type: ImplantGrantCollectiveMind
    collectiveMind: Shadowmind

