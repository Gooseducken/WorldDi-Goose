# Antag Planet

- type: entity
  parent: BaseSubdermalImplant
  id: AntagImplantChangeling
  name: имплант генокрада
  description: Этот имплант позволяет пользователю изменять своё тело, подобно генокраду.
  categories: [ HideSpawnMenu ]
  components:
  - type: ComponentsImplant
    added:
    - type: Changeling
    - type: ChangelingIdentity
    - type: Store
    removed:
    - type: Hunger
    - type: Thirst

- type: entity
  parent: BaseSubdermalImplant
  id: AntagImplantSpaceNinja
  name: имплант ниндзя
  description: Этот имплант позволяет пользователю обрести навыки космического ниндзя.
  categories: [ HideSpawnMenu ]
  components:
  - type: ComponentsImplant
    added:
    - type: SpaceNinja

- type: entity
  parent: BaseSubdermalImplant
  id: XenoCompatibilityImplant
  name: имплант кено-совместимости
  description: Позволяет субъекту пересаживать кено-органы.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    permanent: true
    whitelist:
      requireAll: true
      components:
      - Body
      - Bloodstream
      - Dna
  - type: ComponentsImplant
    added:
    - type: XenoCompatible

- type: entity
  parent: BaseSubdermalImplant
  id: RedspaceLifelineImplant
  name: редспейс-имплант спасательного троса
  description: Телепортирует тело носителя в Верховное Командование Синдиката при активации. Возврат невозможен.
  categories: [ HideSpawnMenu ]
  components:
    - type: SubdermalImplant
      permanent: true
      implantAction: ActionActivateRedspaceLifeline
    - type: MansusGraspBlockTrigger
    - type: TriggerOnMobstateChange
      mobState:
        - Dead
    - type: TriggerOnActivateImplant
    - type: DeleteParentOnTrigger
    - type: SpawnOnTrigger
      proto: RedspaceLifelineSpawnCore
    - type: Tag
